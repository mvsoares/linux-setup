# =============================================================================
# versions.conf — Pinned tool versions for reproducible installs
# =============================================================================
# These versions are used as fallbacks when API lookups fail (rate limits, no
# network, etc.), or as fixed pins when USE_PINNED_VERSIONS=true.
#
# Update workflow:
#   1. Bump version here
#   2. Re-run:  sudo bash setup.sh --reset <step>
#
# To always use these exact versions (skip API lookups):
#   sudo USE_PINNED_VERSIONS=true bash setup.sh
# =============================================================================

# ── Fonts ────────────────────────────────────────────────────────────────────
NERD_FONT_VER_PIN="v3.3.0"

# ── Languages ────────────────────────────────────────────────────────────────
NVM_VER_PIN="v0.40.1"
GO_VER_PIN="go1.23.4"

# ── Kubernetes ───────────────────────────────────────────────────────────────
KUBECTL_VER_PIN="v1.31.3"
