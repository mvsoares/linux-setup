---
# Data-driven configuration for workstation setup

packages:
  core:
    - curl
    - wget
    - git
    - build-essential
    - jq
    - apt-transport-https
    - ca-certificates
    - software-properties-common
  cli_tools:
    - bat
    - eza
    - fd-find
    - ripgrep
    - fzf
    - zoxide
    - tmux
  editors:
    - neovim
  languages:
    - python3
    - python3-pip
    - python3-venv

gnome:
  extensions_enabled:
    - user-theme@gnome-shell-extensions.gcampax.github.com
    - dash-to-dock@micxgx.gmail.com
    - appindicatorsupport@rgcjonas.gmail.com

repositories:
  brave: https://brave-browser-apt-release.s3.brave.com/
  vscode: https://packages.microsoft.com/repos/code
  google_chrome: https://dl.google.com/linux/chrome/deb/
