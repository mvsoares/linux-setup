# Theme 20: Minimal Mono
# swatch256: 240 252 0
format="HOST PWD GIT PYENV TF KUBE"
separator_char='\uE0B0'
enable_vertical_padding=true
enable_command_on_new_line=false

font_color_host="white"
background_host="dark-gray"

font_color_pwd="black"
background_pwd="light-gray"

font_color_git="white"
background_git="black"

font_color_pyenv="black"
background_pyenv="white"

font_color_tf="black"
background_tf="light-gray"

font_color_kube="black"
background_kube="white"

font_color_input="111"
background_input="none"
